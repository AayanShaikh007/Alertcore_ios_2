name: AlertCoreApp

options:
  bundleIdPrefix: com.alertcore
  deploymentTarget:
    iOS: 16.0

settings:
  base:
    SWIFT_VERSION: 5.0

targets:
  AlertCoreApp:
    type: application
    platform: iOS
    sources:
      - path: AlertCoreApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alertcore.mobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    scheme:
      testTargets: []
      gatherCoverageData: false