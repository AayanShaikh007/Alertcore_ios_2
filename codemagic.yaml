workflows:
  ios-codemagic:
    name: AlertCore iOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: AlertCoreApp.xcodeproj
        XCODE_SCHEME: AlertCoreApp
    cache:
      cache_paths:
        - ~/.xcodegen
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Resolve package dependencies
        script: xcodebuild -resolvePackageDependencies -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"
      - name: Archive app
        script: xcodebuild archive -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -configuration Release -archivePath "$CM_BUILD_DIR/build/AlertCoreApp.xcarchive" CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        script: |
          set -euo pipefail
          IPA_DIR="$CM_BUILD_DIR/build/ipa"
          ARCHIVE_APP_DIR="$CM_BUILD_DIR/build/AlertCoreApp.xcarchive/Products/Applications"
          APP_PATH="$(find "$ARCHIVE_APP_DIR" -maxdepth 1 -name "*.app" | head -n 1)"
          test -n "$APP_PATH"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qry AlertCoreApp.ipa Payload
      - name: Validate IPA structure and binary format
        script: |
          set -euo pipefail
          /bin/bash ./scripts/validate_ipa.sh "$CM_BUILD_DIR/build/ipa/AlertCoreApp.ipa"
    artifacts:
      - build/AlertCoreApp.xcarchive
      - build/ipa/AlertCoreApp.ipa